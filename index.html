<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List Gustavo</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <h1 class='titulo'>To Do List</h1>
    <br>
    <div id='container'>
        <input id='text-input' type="text" class='inserir' placeholder="Adicionar nova tarefa">
        <button onclick="add()">Adicionar</button>
        <h3>Lista</h3>
        <ul id='lista'>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
        </ul>
        <button class='limpar'>Limpar lista</button>
    </div>

    <script>
        // referencia elementos que vou utilizar
        const input = document.getElementById('text-input')
        const ul = document.getElementById('lista')

        function add() {
            // pega o texto do input
            const texto = input.value

            // cria um novo elemento <li></li>
            const li = document.createElement('li')

            // adiciona o texto dentro do elemento li
            li.innerText = texto

            // adiciona o elemento li (já com o texto) dentro da lista
            ul.appendChild(li)

            // apaga o valor no input
            input.value = ""
        }
    </script>
</body>

</html>
